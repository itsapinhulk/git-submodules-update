name: Publish

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+'
  workflow_run:
    workflows: ["Tag"]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "name=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Package artifacts
        run: bash scripts/package dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.name }}
          REPO: ${{ github.repository }}
        run: |
          release_id=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "$(python3 -c "
          import json, sys
          print(json.dumps({
              'tag_name': sys.argv[1],
              'name': sys.argv[1],
              'generate_release_notes': True,
          }))
          " "$TAG")" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          curl -sf \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/zip" \
            "https://uploads.github.com/repos/${REPO}/releases/${release_id}/assets?name=release.zip" \
            --data-binary @dist/release.zip
